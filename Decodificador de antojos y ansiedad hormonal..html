<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decodificador Biológico de Antojos 40+</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            blush: {
              50: '#fffbfb',
              100: '#fdf3f1',
              200: '#fbe8e4',
              500: '#d49a8f',
              600: '#c58579',
              700: '#a6695d'
            },
            lavender: {
              50: '#fbfaff',
              100: '#f3effa',
              200: '#e8e2f4',
              600: '#8e7cb5',
              700: '#75629e'
            },
            sage: {
              50: '#f7f9f6',
              100: '#edf2eb',
              600: '#7a9a73'
            },
            warmBeige: {
              50: '#faf8f5',
              100: '#f5efe6',
              200: '#eaddcd'
            }
          }
        }
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>
</head>
<body class="bg-warmBeige-50 text-slate-800 antialiased p-3 sm:p-6 flex items-start justify-center min-h-screen">

  <div id="root" class="w-full max-w-md mx-auto h-auto"></div>

  <script data-type="module" type="text/babel">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Sparkles, RefreshCw, ChevronRight, ArrowLeft, Heart, Brain, Clock, Check, Leaf, Award, Video } from 'lucide-react';

    // Base de datos de antojos enriquecida
    const ANTOJOS_DATA = {
      1: {
        id: 1,
        titulo: "Ansiedad por Dulces o Harinas",
        momento: "Media Tarde (4:00 PM - 7:00 PM)",
        tag: "Fluctuación de Estrógenos",
        explicacion: "Tu cerebro experimenta una caída natural de estrógenos que arrastra consigo los niveles de serotonina. No es falta de fuerza de voluntad: es tu química exigiendo una recompensa de dopamina rápida para equilibrar el ánimo.",
        pasos: [
          {
            accion: "Toma una infusión de canela caliente",
            descripcion: "La canela contiene polifenoles que ayudan a estabilizar la respuesta de la insulina en las células, calmando el impulso dulce en el cerebro sin generar picos de glucosa dañinos."
          },
          {
            accion: "Haz 4 respiraciones rítmicas conscientes",
            descripcion: "Inhala profundamente durante 4 segundos, mantén el aire 4 segundos y exhala en otros 4. Esto reduce de inmediato los niveles de cortisol y el estado de alerta que te pide energía rápida."
          },
          {
            accion: "Consume 1 onza de cacao >70% con 5 almendras",
            descripcion: "Aporta grasas saludables y polifenoles esenciales. Las almendras ralentizan el vaciado gástrico, asegurando que la señal de saciedad llegue nítida y limpia a tu sistema nervioso."
          }
        ]
      },
      2: {
        id: 2,
        titulo: "Hambre Voraz e Inquieta",
        momento: "Noche (8:00 PM en adelante)",
        tag: "Pico de Cortisol Diario",
        explicacion: "El estrés acumulado del día mantiene tu cortisol por las nubes. Al llegar la noche, la hormona grelina se dispara exigiéndote energía densa y rápida para compensar el cansancio físico y mental crónico.",
        pasos: [
          {
            accion: "Aplica esíimulo térmico fresco en tus muñecas",
            descripcion: "El contacto con agua fresca entera estimula sutilmente la respuesta del nervio vago, reduciendo la frecuencia cardíaca y suavizando la urgencia mental por buscar alimentos hipercalóricos."
          },
          {
            accion: "Adopta una postura de descanso lumbar 2 minutos",
            descripcion: "Sentarse o recostarse estirando suavemente la espalda alivia la presión suprarrenal y envía señales de seguridad al cerebro, indicándole que el día de actividad ha terminado.",
            videoUrl: "https://youtu.be/cKyA26VFEIg?si=reKo-9d3SKatbjLY",
            videoTexto: "Ver guía en video"
          },
          {
            accion: "Elige un snack de proteína limpia y ligera",
            descripcion: "Un par de cucharadas de yogur natural o unas nueces estabilizan los aminoácidos plasmáticos en sangre, evitando bajones de azúcar a mitad de la noche que alteren tu descanso."
          }
        ]
      },
      3: {
        id: 3,
        titulo: "Ataque Nocturno Desvelado",
        momento: "Madrugada (11:00 PM - 2:00 AM)",
        tag: "Déficit de Melatonina",
        explicacion: "Al retrasar el sueño o despertar en alerta, el cuerpo interpreta la fatiga como una crisis biológica por falta de combustible. Confunde la necesidad de descanso profundo con una demanda urgente de azúcar de fácil absorción.",
        pasos: [
          {
            accion: "Asegura tu aporte de Magnesio Natural antes de acostarte",
            descripcion: "Si no tienes un suplemento a la mano, consume un pequeño puñado de semillas de calabaza (pipas) o de 5 a 8 almendras unos 30-45 minutos antes de dormir. Son fuentes de la naturaleza repletas de magnesio que relajan los músculos y modulan el cortisol nocturno."
          },
          {
            accion: "Bebe un vaso corto de agua tibia",
            descripcion: "Si te despiertas con ansiedad, el agua tibia relaja las paredes del sistema digestivo y promueve la activación parasimpática, recordándole al cerebro que la verdadera necesidad es el sueño, no la comida."
          },
          {
            accion: "Colócate calcetines cómodos y abrigados",
            descripcion: "Calentar las extremidades produce una vasodilatación periférica que ayuda a redistribuir la temperatura corporal, un paso biológico indispensable para facilitar la transición hacia el sueño profundo."
          }
        ]
      }
    };

    function App() {
      const [view, setView] = useState('home');
      const [selectedId, setSelectedId] = useState(null);
      const [checkedSteps, setCheckedSteps] = useState({});
      
      const [rescueCount, setRescueCount] = useState(() => {
        return parseInt(localStorage.getItem('energia_manana_rescues') || '0');
      });

      useEffect(() => {
        localStorage.setItem('energia_manana_rescues', rescueCount);
      }, [rescueCount]);

      const handleStartAnalysis = (id) => {
        setSelectedId(id);
        setView('loading');
        setCheckedSteps({});
        setTimeout(() => setView('result'), 1300);
      };

      const handleToggleStep = (index) => {
        setCheckedSteps(prev => ({
          ...prev,
          [index]: !prev[index]
        }));
      };

      const handleConfirmRescue = () => {
        setRescueCount(prev => prev + 1);
        setView('success');
      };

      const currentAntojo = ANTOJOS_DATA[selectedId];

      // --- VISTA 1: PROCESAMIENTO BIOLÓGICO ---
      if (view === 'loading') {
        return (
          <div class="bg-white rounded-3xl shadow-md border border-blush-100 p-8 text-center py-16 transition-all duration-300">
            <div class="flex justify-center mb-4 text-blush-500">
              <RefreshCw class="w-10 h-10 animate-spin" />
            </div>
            <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider">Decodificando Señal Hormonal</h3>
            <p class="text-xs text-slate-400 mt-2 max-w-xs mx-auto leading-relaxed">
              Analizando balance de estrógenos, receptores de melatonina y curvas de cortisol vespertinas...
            </p>
          </div>
        );
      }

      // --- VISTA 2: HOJA DE RUTA & CHECKLIST ---
      if (view === 'result' && currentAntojo) {
        const isAllDone = currentAntojo.pasos.every((_, idx) => checkedSteps[idx]);

        return (
          <div class="bg-white rounded-3xl shadow-md border border-blush-100 overflow-hidden w-full transition-all duration-300 relative">
            
            <div class="absolute top-2 right-3 text-blush-100 pointer-events-none opacity-40">
              <Leaf class="w-24 h-24 rotate-45" />
            </div>

            {/* Cabecera */}
            <div class="p-5 border-b border-blush-50 bg-blush-50/60 relative z-10">
              <button 
                onClick={() => setView('home')} 
                class="inline-flex items-center gap-1 text-xs font-bold text-blush-600 hover:text-blush-700 transition-colors mb-3"
              >
                <ArrowLeft class="w-3.5 h-3.5" /> Volver al menú principal
              </button>
              
              <div>
                <span class="inline-block bg-lavender-100 text-lavender-700 font-bold text-[10px] px-2.5 py-0.5 rounded-full uppercase tracking-wider mb-1.5">
                  {currentAntojo.tag}
                </span>
                <h2 class="text-lg font-bold text-slate-900 tracking-tight leading-snug">{currentAntojo.titulo}</h2>
                <p class="text-[11px] text-slate-400 font-medium flex items-center gap-1 mt-1">
                  <Clock class="w-3.5 h-3.5 text-blush-500" /> Ventana de riesgo: {currentAntojo.momento}
                </p>
              </div>
            </div>

            {/* Explicación Científica Compasiva */}
            <div class="p-5 bg-lavender-50/50 border-b border-blush-50 flex gap-3 items-start relative z-10">
              <div class="p-2 bg-white rounded-xl shadow-sm text-lavender-600 shrink-0">
                <Brain class="w-4 h-4" />
              </div>
              <div>
                <h4 class="text-xs font-bold text-slate-800 uppercase tracking-wider">Tu cuerpo no te sabotea:</h4>
                <p class="text-xs text-slate-600 leading-relaxed font-medium mt-1">
                  {currentAntojo.explicacion}
                </p>
              </div>
            </div>

            {/* Lista de Pasos */}
            <div class="p-5 space-y-4 relative z-10">
              <div class="flex justify-between items-center">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1">
                  <Leaf class="w-3.5 h-3.5 text-sage-600" /> Plan de Rescate Sostenible
                </h4>
                <span class="text-[10px] text-blush-600 font-bold bg-blush-100/60 px-2 py-0.5 rounded">Paso a paso</span>
              </div>

              <div class="space-y-3">
                {currentAntojo.pasos.map((paso, index) => {
                  const done = !!checkedSteps[index];
                  return (
                    <div 
                      key={index}
                      onClick={() => handleToggleStep(index)}
                      class={`p-3.5 rounded-2xl border transition-all duration-200 cursor-pointer flex gap-3 items-start select-none ${
                        done 
                          ? 'bg-sage-50/60 border-sage-600/30 shadow-none' 
                          : 'bg-white border-slate-100 hover:border-blush-200 shadow-sm hover:scale-[1.01]'
                      }`}
                    >
                      <div class="mt-0.5 shrink-0">
                        <div class={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold transition-all ${
                          done 
                            ? 'bg-sage-600 text-white' 
                            : 'bg-slate-50 text-slate-400 border border-slate-200'
                        }`}>
                          {done ? <Check class="w-3 h-3 stroke-[3]" /> : index + 1}
                        </div>
                      </div>
                      
                      <div class="space-y-1 w-full">
                        <p class={`text-xs font-bold tracking-tight transition-colors ${done ? 'text-slate-400 line-through' : 'text-slate-900'}`}>
                          {paso.accion}
                        </p>
                        <p class="text-[11px] text-slate-500 leading-normal font-medium">
                          {paso.descripcion}
                        </p>
                        
                        {/* BOTÓN ENLACE EXTERNO A YOUTUBE (Opcional por paso) */}
                        {paso.videoUrl && (
                          <a 
                            href={paso.videoUrl} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            onClick={(e) => e.stopPropagation()} /* Evita activar el check al hacer clic en el botón */
                            class="inline-flex items-center gap-1.5 mt-2 text-[10px] font-bold text-blush-700 bg-blush-100 hover:bg-blush-200/80 px-2.5 py-1.5 rounded-lg transition-colors border border-blush-200/60 shadow-sm"
                          >
                            <Video class="w-3 h-3" />
                            <span>{paso.videoTexto || 'Ver video instructivo'}</span>
                          </a>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Guardar Progreso */}
            <div class="p-5 bg-warmBeige-50 border-t border-blush-50">
              <button
                onClick={handleConfirmRescue}
                disabled={!isAllDone}
                class={`w-full py-3.5 px-4 rounded-xl text-xs font-bold uppercase tracking-widest shadow-sm transition-all flex items-center justify-center gap-2 ${
                  isAllDone 
                    ? 'bg-blush-600 hover:bg-blush-700 text-white hover:scale-[1.01] active:scale-95' 
                    : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'
                }`}
              >
                {isAllDone ? "Registrar Victoria Metabólica" : "Completa los pasos del protocolo"}
              </button>
              <p class="text-[10px] text-center text-slate-400 font-medium mt-3">
                Cuidar tu descanso y nutrir tu cuerpo disuelve la ansiedad de raíz.
              </p>
            </div>
          </div>
        );
      }

      // --- VISTA 3: ÉXITO ---
      if (view === 'success') {
        return (
          <div class="bg-white rounded-3xl shadow-md border border-blush-100 p-6 text-center py-10 space-y-5 transition-all duration-300">
            <div class="w-12 h-12 bg-sage-50 text-sage-600 rounded-full flex items-center justify-center mx-auto shadow-inner">
              <Award class="w-6 h-6" />
            </div>
            <div class="space-y-1">
              <h2 class="text-base font-bold text-slate-900 uppercase tracking-wide">¡Rescate Biológico Exitoso!</h2>
              <p class="text-xs text-slate-500 max-w-xs mx-auto leading-relaxed font-medium">
                Has hackeado la señal de ansiedad desde el entendimiento molecular, protegiendo tu salud y tu paz mental.
              </p>
            </div>
            <div class="inline-block bg-blush-50 border border-blush-100 px-4 py-2.5 rounded-2xl shadow-sm">
              <span class="text-[10px] uppercase font-bold text-blush-600 block tracking-wider mb-0.5">Total Ansiedades Desarmadas</span>
              <span class="text-lg font-extrabold text-slate-800">{rescueCount} Victorias</span>
            </div>
            <button
              onClick={() => setView('home')}
              class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs uppercase py-3.5 rounded-xl transition-all tracking-wider"
            >
              Regresar al Selector de Señales
            </button>
          </div>
        );
      }

      // --- VISTA 4: MENÚ PRINCIPAL ---
      return (
        <div class="bg-white rounded-3xl shadow-md border border-blush-100 overflow-hidden w-full transition-all duration-300 relative">
          
          <div class="absolute top-0 right-0 text-blush-50 pointer-events-none p-2 opacity-60">
            <Leaf class="w-16 h-16 transform -scale-x-100 rotate-12" />
          </div>

          <header class="p-5 border-b border-blush-50 bg-white relative z-10">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-blush-100 flex items-center justify-center text-blush-600 text-sm font-bold">
                  ✨
                </div>
                <div>
                  <h1 class="text-xs font-bold tracking-wider text-slate-900 uppercase">Decodificador de Antojos</h1>
                  <p class="text-[9px] text-blush-500 font-bold uppercase tracking-widest">Plan Energía de Mañana</p>
                </div>
              </div>
              
              <div class="bg-blush-50 border border-blush-100/60 text-blush-700 px-3 py-1 rounded-full flex items-center gap-1.5 text-xs font-bold">
                <Heart class="w-3.5 h-3.5 fill-current text-blush-500" />
                <span>{rescueCount}</span>
              </div>
            </div>

            <div class="bg-warmBeige-50 border border-warmBeige-200/50 rounded-2xl p-3.5 text-xs text-slate-600 leading-relaxed font-medium">
              <p>
                <strong class="text-slate-900">La regla de oro:</strong> El hambre descontrolada después de los 40 suele ser una señal química de fatiga u hormonas en transición. Aquí no usamos fuerza de voluntad restrictiva; respondemos con ciencia y compasión.
              </p>
            </div>
          </header>

          <main class="p-5 space-y-4 relative z-10">
            <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
              <Sparkles class="w-3.5 h-3.5 text-lavender-600" /> Identifica la señal de tu cuerpo:
            </h3>

            <div class="space-y-2.5">
              {Object.values(ANTOJOS_DATA).map((item) => (
                <button
                  key={item.id}
                  onClick={() => handleStartAnalysis(item.id)}
                  class="w-full p-4 flex items-center justify-between border border-slate-100 rounded-2xl hover:bg-blush-50/40 hover:border-blush-200 shadow-sm hover:shadow transition-all duration-300 group text-left bg-white"
                >
                  <div class="space-y-1.5 pr-2">
                    <div class="flex items-center gap-2">
                      <span class="font-bold text-slate-800 text-xs sm:text-sm group-hover:text-blush-700 transition-colors">
                        {item.titulo}
                      </span>
                    </div>
                    <div class="flex flex-wrap items-center gap-1.5 text-[10px] font-bold">
                      <span class="bg-slate-50 text-slate-400 border border-slate-100 px-2 py-0.5 rounded-md">
                        {item.momento}
                      </span>
                      <span class="text-lavender-600 bg-lavender-50 px-2 py-0.5 rounded-md">
                        {item.tag}
                      </span>
                    </div>
                  </div>
                  <div class="text-slate-300 group-hover:text-blush-500 transition-colors shrink-0">
                    <ChevronRight class="w-5 h-5 transform group-hover:translate-x-0.5 transition-transform" />
                  </div>
                </button>
              ))}
            </div>
          </main>

          <footer class="p-4 bg-blush-50/30 border-t border-blush-50 text-center">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider flex items-center justify-center gap-1">
              <Leaf class="w-3 h-3 text-sage-600" /> Tu biología importa · Sostenibilidad Sin Culpa
            </p>
          </footer>

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
