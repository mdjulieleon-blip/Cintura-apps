<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termómetro Metabólico 40+ & Hábitos Energía de Mañana</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rosegold: {
              50: '#fbf7f5',
              100: '#f5e6e1',
              200: '#edd1c8',
              500: '#c88a75',
              600: '#b8735c',
              700: '#a35c46',
            },
            lavender: {
              50: '#f4f4fc',
              100: '#eae9f8',
              500: '#9490db',
            },
            organic: {
              beige: '#f7f4f0',
              sage: '#8fa89b'
            }
          }
        }
      }
    }
  </script>
  
  <!-- Carga de Babel para procesamiento de JSX en navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Importmap restringido oficial para React y dependencias toleradas -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>
</head>
<body class="bg-[#f7f4f0] text-slate-900 antialiased p-3 sm:p-6 flex items-center justify-center">

  <!-- Contenedor Raíz para React -->
  <div id="root" class="w-full max-w-2xl mx-auto"></div>

  <!-- Componente Aplicativo con React y JSX -->
  <script data-type="module" type="text/babel">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Heart, Check, RefreshCw, Sparkles, ExternalLink, Calendar, Award, BookOpen, AlertCircle, Trash2 } from 'lucide-react';

    // --- BANCO DE DATOS DE EVALUACIÓN ---
    const QUESTIONS = [
      {
        id: 1,
        title: "¿Cómo te sientes en los primeros 30 minutos de tu mañana?",
        description: "El despertar revela el estado real de tus glándulas suprarrenales.",
        options: [
          { text: "Agotada de inmediato, como si un camión me hubiera pasado por encima.", score: 3, label: "Estrés Adrenal Alto" },
          { text: "Intermitente: arranco lenta y dependo 100% del café o té.", score: 2, label: "Dependencia Estimulante" },
          { text: "Despejada y con buena energía natural a los pocos minutos.", score: 1, label: "Equilibrio Matutino" }
        ]
      },
      {
        id: 2,
        title: "¿Qué le ocurre a tu abdomen a medida que avanza el día?",
        description: "La inflamación vespertina es una señal clara de bloqueo digestivo y cortisol.",
        options: [
          { text: "Por la mañana está plano, pero por la tarde parezco embarazada de 5 meses.", score: 3, label: "Inflamación Reactiva" },
          { text: "Siento pesadez, gases y distensión casi de forma constante.", score: 2, label: "Tránsito Lento" },
          { text: "Se mantiene cómodo, ligero y sin cambios drásticos todo el día.", score: 1, label: "Digestión Óptima" }
        ]
      },
      {
        id: 3,
        title: "¿Cómo describirías tu descanso y calidad del sueño?",
        description: "El cortisol elevado por la noche interrumpe la quema de grasa nocturna.",
        options: [
          { text: "Me despierto entre 2:00 AM y 4:00 AM con la mente acelerada y me cuesta volver a dormir.", score: 3, label: "Pico de Cortisol Nocturno" },
          { text: "Sueño muy ligero. Siento que no llego a descansar profundamente.", score: 2, label: "Falta de Sueño Profundo" },
          { text: "Duermo del tirón y me despierto con sensación de haber reparado mi cuerpo.", score: 1, label: "Sueño Reparador" }
        ]
      },
      {
        id: 4,
        title: "¿Sientes tensiones corporales o rigidez recurrente?",
        description: "La inflamación celular crónica se manifiesta a menudo en tus articulaciones.",
        options: [
          { text: "Frecuentes molestias en hombros, espalda baja o articulaciones sin causa aparente.", score: 3, label: "Inflamación Sistémica" },
          { text: "Siento rigidez generalizada al levantarme de la cama o de una silla.", score: 2, label: "Falta de Movilidad" },
          { text: "Me siento flexible, ligera y libre de tensiones crónicas.", score: 1, label: "Cuerpo Desinflamado" }
        ]
      },
      {
        id: 5,
        title: "¿Cómo manejas la tarde (4 PM - 6 PM) y tus antojos?",
        description: "La caída hormonal de la tarde activa señales de emergencia para buscar azúcar rápida.",
        options: [
          { text: "Siento ansiedad incontrolable por dulces, chocolate o carbohidratos crujientes.", score: 3, label: "Ansiedad por Insulina" },
          { text: "Tengo un bajón mental masivo, mal humor o irritabilidad inexplicable.", score: 2, label: "Fatiga Mental Crítica" },
          { text: "Estable, con energía uniforme y sin antojos desesperados.", score: 1, label: "Glucemia Estable" }
        ]
      }
    ];

    const HABITS_CATALOG = {
      supervivencia: [
        { id: 'breath', name: '2 min respiración anti-cortisol', desc: 'Inhalar en 4s, retener 4s, exhalar en 8s. Apaga la señal de peligro celular.', icon: '🌬️', color: 'bg-rose-50 text-rose-700', videoUrl: 'https://www.youtube.com/watch?v=cWFwrzviUBI' },
        { id: 'water_salt', name: 'Agua templada con sal mineral', desc: 'Aporta sodio de calidad para nutrir tus glándulas adrenales exhaustas.', icon: '💧', color: 'bg-blue-50 text-blue-700' },
        { id: 'sun_adrenal', name: '5 min de sol sin pantallas', desc: 'Frena la producción de melatonina y estabiliza el cortisol natural.', icon: '☀️', color: 'bg-amber-50 text-amber-700' },
        { id: 'no_coffee', name: 'Retrasar el café 90 minutos', desc: 'Permite que tu cuerpo se despierte con su propia energía sin colapsar las adrenales.', icon: '☕', color: 'bg-orange-50 text-orange-800' },
        { id: 'brain_dump', name: 'Vaciado mental matutino', desc: 'Escribe 3 cosas que te preocupen para sacarlas del sistema nervioso.', icon: '📝', color: 'bg-purple-50 text-purple-700' }
      ],
      inflamado: [
        { id: 'massage', name: 'Automasaje digestivo (2 min)', desc: 'Movimientos circulares suaves a favor de las agujas del reloj para liberar el colon.', icon: '💆‍♀️', color: 'bg-emerald-50 text-emerald-700', videoUrl: 'https://youtu.be/1nScDXvL60I?si=nKhnvTO6kKxo9LoU' },
        { id: 'lymph', name: 'Movimiento linfático express', desc: 'Pequeños rebotes suaves sobre tus talones para activar el retorno linfático.', icon: '🏃‍♀️', color: 'bg-teal-50 text-teal-700', videoUrl: 'https://www.youtube.com/watch?v=HrcZDgOWQIQ' },
        { id: 'spinal_twist', name: 'Torsiones espinales suaves', desc: 'Torsiones acostada para masajear tus órganos internos y reducir gases.', icon: '🧘‍♀️', color: 'bg-indigo-50 text-indigo-700', videoUrl: 'https://www.youtube.com/watch?v=O_j1bezNJqE' },
        { id: 'warm_water', name: 'Taza de agua tibia pura', desc: 'Despierta el complejo motor migratorio y limpia residuos digestivos.', icon: '🥛', color: 'bg-cyan-50 text-cyan-700' },
        { id: 'anti_inf_tea', name: 'Infusión desinflamatoria', desc: 'Agua caliente con una pizca de jengibre o cúrcuma antes de desayunar.', icon: '🍵', color: 'bg-yellow-50 text-yellow-800' }
      ],
      lento: [
        { id: 'mitochondrial', name: '7 min de Fuerza Mitocondrial', desc: 'Sentadillas o flexiones en la pared para despertar receptores GLUT4.', icon: '⚡', color: 'bg-rose-50 text-rose-700', videoUrl: 'https://www.youtube.com/watch?v=0jXU_nixC-Y' },
        { id: 'metabolic_walk', name: 'Caminata metabólica rápida', desc: '5-10 minutos a paso alegre para encender el gasto calórico basal.', icon: '👟', color: 'bg-emerald-50 text-emerald-700', videoUrl: 'https://www.youtube.com/watch?v=1ADPHzU_0To' },
        { id: 'protein_first', name: 'Desayuno proteico (30g)', desc: 'Huevos o fuente proteica limpia para elevar la termogénesis alimentaria.', icon: '🍳', color: 'bg-amber-50 text-amber-800' },
        { id: 'cold_splash', name: 'Agua fría en rostro o ducha', desc: 'Activa la grasa parda encargada de producir calor y quemar energía.', icon: '❄️', color: 'bg-blue-50 text-blue-700' },
        { id: 'sun_thyroid', name: 'Luz matutina en el cuello', desc: 'Estimula la glándula tiroides mediante fotorrecepción natural.', icon: '🌿', color: 'bg-green-50 text-green-700' }
      ]
    };

    const DAYS = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

    // --- ELEMENTOS DE ORNAMENTO ORGÁNICO EN SVG ---
    const LeavesDecoration = () => (
      <div className="absolute inset-0 pointer-events-none overflow-hidden z-0">
        <svg className="absolute top-0 right-0 w-24 h-24 text-rosegold-200/40 transform translate-x-4 -translate-y-4" fill="currentColor" viewBox="0 0 100 100">
          <path d="M70,20 C85,35 80,60 55,65 C40,50 45,25 70,20 Z M40,50 C55,65 50,85 25,85 C15,70 20,55 40,50 Z" />
        </svg>
        <svg className="absolute bottom-0 left-0 w-20 h-20 text-rosegold-200/30 transform -translate-x-4 translate-y-4 rotate-90" fill="currentColor" viewBox="0 0 100 100">
          <path d="M70,20 C85,35 80,60 55,65 C40,50 45,25 70,20 Z" />
        </svg>
      </div>
    );

    function App() {
      // --- ESTADOS PERSISTENTES CON LOCALSTORAGE ---
      const [step, setStep] = useState(() => localStorage.getItem('m40_react_step') || 'welcome');
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [answers, setAnswers] = useState({});
      const [metabolicReport, setMetabolicReport] = useState(() => {
        const saved = localStorage.getItem('m40_react_report');
        return saved ? JSON.parse(saved) : null;
      });
      const [selectedHabits, setSelectedHabits] = useState(() => {
        const saved = localStorage.getItem('m40_react_habits');
        return saved ? JSON.parse(saved) : [];
      });
      const [weeklyProgress, setWeeklyProgress] = useState(() => {
        const saved = localStorage.getItem('m40_react_progress');
        return saved ? JSON.parse(saved) : {};
      });
      const [activeVideo, setActiveVideo] = useState(null);

      // Sincronización automática de Persistencia
      useEffect(() => {
        localStorage.setItem('m40_react_step', step);
        localStorage.setItem('m40_react_report', JSON.stringify(metabolicReport));
        localStorage.setItem('m40_react_habits', JSON.stringify(selectedHabits));
        localStorage.setItem('m40_react_progress', JSON.stringify(weeklyProgress));
      }, [step, metabolicReport, selectedHabits, weeklyProgress]);

      // --- LOGICA DE CONTROL ---
      const startQuiz = () => {
        setAnswers({});
        setCurrentQuestionIndex(0);
        setStep('quiz');
      };

      const handleAnswer = (score) => {
        const currentQuestion = QUESTIONS[currentQuestionIndex];
        const updatedAnswers = { ...answers, [currentQuestion.id]: score };
        setAnswers(updatedAnswers);

        if (currentQuestionIndex < QUESTIONS.length - 1) {
          setCurrentQuestionIndex(currentQuestionIndex + 1);
        } else {
          calculateDiagnosis(updatedAnswers);
        }
      };

      const calculateDiagnosis = (finalAnswers) => {
        const total = Object.values(finalAnswers).reduce((a, b) => a + b, 0);
        let report = {};

        if (total >= 12) {
          report = {
            key: "supervivencia",
            score: total,
            title: "Metabolismo en Modo Supervivencia",
            colorClass: "bg-rose-50/80 border-rose-100 text-rose-950",
            description: "Tus niveles de cortisol e inflamación celular están constantemente altos. Tu cuerpo interpreta esto como una amenaza vital latente, bloqueando activamente la quema de grasa y almacenándola en el abdomen como escudo protector.",
            whyFailed: "Las restricciones extremas o pasar hambre añaden más estrés a tus glándulas adrenales. Tu cerebro responde apagando la tiroides y gatillando antojos incontrolables.",
            protocol: "Protocolo de Reset Hormonal y Cortisol Cero Matutino."
          };
        } else if (total >= 8) {
          report = {
            key: "inflamado",
            score: total,
            title: "Metabolismo Inflamado y Congestionado",
            colorClass: "bg-amber-50/70 border-amber-100 text-amber-950",
            description: "Presentas una acumulación de inflamación de bajo grado y ralentización digestiva. Los desbalances estrogénicos propios de los 40+ alteran la retención de líquidos.",
            whyFailed: "Hacer horas de ejercicio cardiovascular extenuante o basar tu dieta en alimentos crudos y fríos estresa el colon. Necesitas activar la linfa y aportar alimentos reconfortantes.",
            protocol: "Protocolo Anti-Barriga 40+ (Fase Drenaje y Linfa Activa)."
          };
        } else {
          report = {
            key: "lento",
            score: total,
            title: "Metabolismo Lento por Adaptación Hormonal",
            colorClass: "bg-emerald-50/70 border-emerald-100 text-emerald-950",
            description: "Tu ritmo metabólico basal ha disminuido debido a la transición natural de hormonas ováricas. Tu cuerpo gasta menos energía en reposo.",
            whyFailed: "Los planes estándar ignoran la pérdida natural de masa muscular y la reducción de la sensibilidad a la insulina a esta edad. Comer menos sin estímulo muscular solo debilita el motor metabólico.",
            protocol: "Protocolo de Activación Mitocondrial y Densidad de Nutrientes."
          };
        }

        setMetabolicReport(report);
        setSelectedHabits([]);
        setStep('result');
      };

      const toggleHabit = (habit) => {
        const exists = selectedHabits.some(h => h.id === habit.id);
        if (exists) {
          setSelectedHabits(selectedHabits.filter(h => h.id !== habit.id));
        } else if (selectedHabits.length < 3) {
          setSelectedHabits([...selectedHabits, habit]);
        }
      };

      const activateDashboard = () => {
        if (selectedHabits.length !== 3) return;
        const initProgress = {};
        DAYS.forEach(d => {
          initProgress[d] = {};
          selectedHabits.forEach(h => {
            initProgress[d][h.id] = false;
          });
        });
        setWeeklyProgress(initProgress);
        setStep('dashboard');
        setActiveVideo(null);
      };

      const toggleProgress = (day, habitId) => {
        setWeeklyProgress({
          ...weeklyProgress,
          [day]: {
            ...weeklyProgress[day],
            [habitId]: !weeklyProgress[day]?.[habitId]
          }
        });
      };

      const resetApp = () => {
        if (confirm("¿Deseas reiniciar tu bitácora? Esto borrará tus registros actuales de la semana para iniciar un nuevo ciclo.")) {
          localStorage.clear();
          setStep('welcome');
          setCurrentQuestionIndex(0);
          setAnswers({});
          setMetabolicReport(null);
          setSelectedHabits([]);
          setWeeklyProgress({});
          setActiveVideo(null);
        }
      };

      // Cálculos de métricas del Dashboard
      const stats = React.useMemo(() => {
        if (step !== 'dashboard' || !selectedHabits.length) return { pct: 0, completed: 0, totalDays: 0 };
        let totalPossible = selectedHabits.length * 7;
        let completed = 0;
        let activeDaysSet = new Set();

        Object.entries(weeklyProgress).forEach(([day, habitsObj]) => {
          Object.entries(habitsObj).forEach(([hId, val]) => {
            if (val) {
              completed++;
              activeDaysSet.add(day);
            }
          });
        });

        return {
          completed,
          pct: totalPossible ? Math.round((completed / totalPossible) * 100) : 0,
          totalDays: activeDaysSet.size
        };
      }, [weeklyProgress, selectedHabits, step]);

      return (
        <div class="bg-white rounded-3xl shadow-xl border border-rosegold-100 overflow-hidden relative w-full h-auto">
          
          {/* CABECERA DE LA APP */}
          <header class="p-5 border-b border-rosegold-100 flex items-center justify-between bg-white relative z-10">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 bg-rosegold-100 rounded-xl flex items-center justify-center text-rosegold-600 font-bold text-sm">🌿</div>
              <div>
                <h1 class="text-xs font-bold text-slate-900 tracking-tight leading-none">Termómetro Vital 40+</h1>
                <span class="text-[10px] text-slate-400">Espacio de Salud Hormonal</span>
              </div>
            </div>
            {step === 'dashboard' && (
              <button onClick={resetApp} class="text-[11px] text-slate-400 hover:text-rose-500 transition-colors flex items-center gap-1 font-medium bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">
                <RefreshCw class="w-3 h-3" /> Reiniciar Plan
              </button>
            )}
          </header>

          {/* CUERPO CENTRAL ASÍNCRONO */}
          <main class="relative z-10">
            
            {/* VISTA 1: BIENVENIDA */}
            {step === 'welcome' && (
              <div class="p-6 sm:p-8 text-center space-y-6 relative">
                <LeavesDecoration />
                <span class="inline-block px-3 py-1 bg-rosegold-100 text-rosegold-700 text-[10px] font-bold rounded-full uppercase tracking-wider">
                  Diagnóstico de Precisión Matutina
                </span>
                <h2 class="text-xl sm:text-2xl font-extrabold text-slate-900 tracking-tight leading-snug">
                  Activa tu Bitácora Diaria de Energía Matutina
                </h2>
                <p class="text-xs sm:text-sm text-slate-500 max-w-md mx-auto leading-relaxed">
                  Hola, querida alumna. Para configurar tus 3 micro-hábitos personalizados sin saturar tu fuerza de voluntad, evaluemos primero el nivel de estrés de tu termómetro metabólico.
                </p>
                <div class="pt-2">
                  <button onClick={startQuiz} class="w-full sm:w-auto px-6 py-3 bg-rosegold-600 hover:bg-rosegold-700 text-white font-bold rounded-xl shadow-md transition-all text-xs uppercase tracking-wider hover:scale-[1.01] active:scale-95">
                    Comenzar Evaluación Corta →
                  </button>
                </div>
              </div>
            )}

            {/* VISTA 2: CUESTIONARIO */}
            {step === 'quiz' && (() => {
              const q = QUESTIONS[currentQuestionIndex];
              const progress = ((currentQuestionIndex + 1) / QUESTIONS.length) * 100;
              return (
                <div class="p-6 sm:p-8 space-y-5">
                  <div class="flex justify-between items-center text-[10px] text-slate-400 font-bold uppercase tracking-wider">
                    <span>Análisis de Bloqueo Hormonal</span>
                    <span>{currentQuestionIndex + 1} de {QUESTIONS.length}</span>
                  </div>
                  <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                    <div class="bg-rosegold-500 h-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                  </div>
                  <div class="space-y-1">
                    <h3 class="text-base sm:text-lg font-bold text-slate-900 leading-snug">{q.title}</h3>
                    <p class="text-xs text-slate-400 italic">{q.description}</p>
                  </div>
                  <div class="space-y-2 pt-2">
                    {q.options.map((opt, i) => (
                      <button key={i} onClick={() => handleAnswer(opt.score)} class="w-full text-left p-3.5 rounded-xl border border-slate-200 hover:border-rosegold-500 hover:bg-rosegold-50/30 transition-all flex gap-3 items-start group">
                        <span class="w-5 h-5 rounded-md bg-slate-100 text-slate-500 text-xs font-bold flex items-center justify-center group-hover:bg-rosegold-100 group-hover:text-rosegold-700 shrink-0 mt-0.5">
                          {String.fromCharCode(65 + i)}
                        </span>
                        <div>
                          <p class="text-xs sm:text-sm font-semibold text-slate-800 group-hover:text-slate-900 leading-tight">{opt.text}</p>
                          <span class="text-[9px] text-slate-400 block mt-0.5 font-medium">{opt.label}</span>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              );
            })()}

            {/* VISTA 3: RESULTADOS */}
            {step === 'result' && metabolicReport && (
              <div class="p-6 sm:p-8 space-y-5 relative">
                <LeavesDecoration />
                <div class="text-center">
                  <span class="text-[9px] font-bold text-rosegold-600 uppercase bg-rosegold-100 px-3 py-1 rounded-full tracking-wider">Tu Perfil Metabólico Registrado</span>
                </div>
                
                <div class={`p-5 rounded-2xl border ${metabolicReport.colorClass} space-y-2`}>
                  <h3 class="text-base sm:text-lg font-black tracking-tight flex items-center gap-2">
                    <span>🌸</span> {metabolicReport.title}
                  </h3>
                  <p class="text-xs sm:text-sm leading-relaxed">{metabolicReport.description}</p>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-1">
                  <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">¿Por qué fallaban las dietas tradicionales?</h4>
                  <p class="text-xs text-slate-600 leading-relaxed">{metabolicReport.whyFailed}</p>
                </div>

                <div class="p-4 bg-lavender-50 rounded-xl border border-lavender-100 text-slate-900">
                  <span class="text-[9px] font-bold text-lavender-500 uppercase tracking-wide block">Estrategia de Restauración:</span>
                  <p class="text-xs sm:text-sm font-bold mt-0.5 text-slate-800">{metabolicReport.protocol}</p>
                </div>

                <button onClick={() => setStep('habit_select')} class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs uppercase tracking-wider rounded-xl transition-all shadow-md">
                  Configurar Mis 3 Hábitos Adaptados →
                </button>
              </div>
            )}

            {/* VISTA 4: SELECCIÓN DE HÁBITOS */}
            {step === 'habit_select' && metabolicReport && (() => {
              const catalog = HABITS_CATALOG[metabolicReport.key] || [];
              const count = selectedHabits.length;
              return (
                <div class="p-6 sm:p-8 space-y-5">
                  <div class="text-center space-y-1">
                    <h2 class="text-base sm:text-lg font-bold text-slate-900">Elige tus 3 Pilares Matutinos</h2>
                    <p class="text-xs text-slate-400 max-w-sm mx-auto">Selecciona exactamente 3 acciones recomendadas para tu estado actual. Menos es más para crear constancia.</p>
                  </div>

                  <div class="space-y-2">
                    {catalog.map(h => {
                      const isSel = selectedHabits.some(sh => sh.id === h.id);
                      const isDisabled = !isSel && count >= 3;
                      return (
                        <button 
                          key={h.id}
                          onClick={() => toggleHabit(h)} 
                          disabled={isDisabled}
                          style={isDisabled ? { opacity: 0.5, cursor: 'not-allowed' } : {}}
                          class={`w-full p-3.5 rounded-xl border text-left transition-all flex gap-3 items-start relative ${isSel ? 'border-rosegold-500 bg-rosegold-50/30' : 'border-slate-200 hover:bg-slate-50/50'}`}
                        >
                          <span class={`p-2 rounded-lg text-lg shrink-0 ${h.color}`}>{h.icon}</span>
                          <div class="pr-6">
                            <div class="flex items-center gap-1.5 flex-wrap">
                              <span class="text-xs sm:text-sm font-bold text-slate-900 leading-tight">{h.name}</span>
                              {h.videoUrl && <span class="bg-lavender-100 text-lavender-500 text-[8px] font-extrabold px-1.5 py-0.5 rounded tracking-wide uppercase">Video Guía</span>}
                            </div>
                            <p class="text-xs text-slate-500 mt-0.5 leading-snug">{h.desc}</p>
                          </div>
                          <div class="absolute right-4 top-1/2 -translate-y-1/2">
                            <div class="w-5 h-5 rounded-full border flex items-center justify-center transition-all">
                              {isSel && <div class="w-2.5 h-2.5 bg-rosegold-500 rounded-full"></div>}
                            </div>
                          </div>
                        </button>
                      );
                    })}
                  </div>

                  <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl text-[11px] font-bold text-slate-500 border border-slate-100">
                    <span>HÁBITOS ELEGIDOS: {count} DE 3</span>
                    {count === 3 ? <span class="text-emerald-600">✓ Balance Perfecto</span> : <span>Faltan elegir {3 - count}</span>}
                  </div>

                  <button 
                    onClick={activateDashboard} 
                    disabled={count !== 3} 
                    class={`w-full py-3.5 font-bold rounded-xl text-xs uppercase tracking-wider transition-all shadow-md ${count === 3 ? 'bg-rosegold-500 hover:bg-rosegold-600 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                  >
                    Activar Mi Bitácora Semanal
                  </button>
                </div>
              );
            })()}

            {/* VISTA 5: TABLERO INTEGRADO (DASHBOARD) */}
            {step === 'dashboard' && (
              <div class="p-4 sm:p-6 space-y-6 relative">
                
                {/* REPRODUCTOR REDIRIGIDO DE CLASE (MENSAJE DE TRANQUILIDAD DE ALTA INTEGRIDAD) */}
                {activeVideo ? (
                  <div class="p-4 bg-slate-900 text-white rounded-2xl space-y-3 border border-slate-950 shadow-xl transition-all duration-300">
                    <div class="flex justify-between items-center">
                      <span class="text-[9px] font-bold tracking-wider text-rosegold-200 uppercase flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                        Espacio de Acceso Seguro
                      </span>
                      <button onClick={() => setActiveVideo(null)} class="text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-0.5 rounded transition-colors">
                        Ocultar Panel ✕
                      </button>
                    </div>
                    
                    <div class="space-y-1">
                      <h4 class="text-xs sm:text-sm font-bold text-white leading-tight">{activeVideo.name}</h4>
                      <p class="text-[11px] text-slate-300 leading-relaxed">
                        Querida alumna, para garantizar que puedas ver tu rutina de inmediato, con la máxima velocidad y sin ningún bloqueo o pantalla gris por parte del navegador, he preparado el acceso directo.
                      </p>
                    </div>

                    <div class="bg-slate-800/80 p-4 rounded-xl border border-slate-700 text-center pt-3">
                      <a 
                        href={activeVideo.videoUrl} 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        class="inline-flex items-center gap-2 bg-rosegold-500 hover:bg-rosegold-600 text-white text-xs font-bold px-5 py-2.5 rounded-xl transition-transform transform hover:scale-[1.02] shadow-md"
                      >
                        📺 Ver rutina directamente en YouTube <ExternalLink class="w-3.5 h-3.5" />
                      </a>
                      <span class="block text-[9px] text-slate-400 mt-2 italic">Se abrirá de forma segura en una pestaña nueva para no interrumpir tu progreso semanal.</span>
                    </div>
                  </div>
                ) : (
                  <div class="p-3 bg-slate-50 rounded-xl border border-slate-200/60 text-center text-xs text-slate-500 flex items-center justify-center gap-2">
                    <BookOpen class="w-4 h-4 text-rosegold-500 shrink-0" />
                    <span>Toca en <strong>"🎬 Ver videoguía"</strong> en la tabla para desplegar el acceso a tus clases.</span>
                  </div>
                )}

                {/* TARJETAS DE MÉTRICAS */}
                <div class="grid grid-cols-3 gap-2 sm:gap-3">
                  <div class="bg-rosegold-50/60 p-3 rounded-xl border border-rosegold-100 flex flex-col justify-between">
                    <span class="text-[9px] text-slate-400 font-bold uppercase">Consistencia</span>
                    <span class="text-base sm:text-lg font-black text-slate-900 mt-0.5">{stats.pct}%</span>
                    <div class="w-full bg-slate-200 h-1 rounded-full mt-1 overflow-hidden">
                      <div class="bg-rosegold-500 h-full" style={{ width: `${stats.pct}%` }}></div>
                    </div>
                  </div>
                  <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 flex flex-col justify-between">
                    <span class="text-[9px] text-slate-400 font-bold uppercase">Puntos Vitales</span>
                    <span class="text-base sm:text-lg font-black text-rosegold-600 mt-0.5">+{stats.completed * 10}</span>
                    <span class="text-[8px] text-slate-400 block">+10 por logro</span>
                  </div>
                  <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 flex flex-col justify-between">
                    <span class="text-[9px] text-slate-400 font-bold uppercase">Días Activos</span>
                    <span class="text-base sm:text-lg font-black text-slate-900 mt-0.5 flex items-center gap-0.5">🔥 {stats.totalDays}</span>
                    <span class="text-[8px] text-slate-400 block">Semanales</span>
                  </div>
                </div>

                {/* PANEL OPERATIVO SEMANAS */}
                <div class="space-y-2">
                  <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1">
                      <Calendar class="w-3 h-3" /> Mi Panel de Control Semanal
                    </h3>
                    <button onClick={() => setStep('habit_select')} class="text-[10px] font-bold text-rosegold-600 bg-rosegold-50 px-2 py-0.5 rounded-full hover:underline">
                      Cambiar Hábitos
                    </button>
                  </div>

                  {/* TABLA HORIZONTAL RESPONSIVA CON SCROLL */}
                  <div class="overflow-x-auto pb-2 -mx-4 px-4 sm:mx-0 sm:px-0">
                    <div class="min-w-[560px] bg-slate-50/70 border border-slate-100 p-3 rounded-2xl grid grid-cols-8 gap-2">
                      
                      {/* Columna Izquierda: Nombres */}
                      <div class="col-span-2 flex flex-col justify-around py-1 pr-1 border-r border-slate-200/60">
                        <span class="text-[9px] font-bold text-slate-400 uppercase h-5 flex items-center">Mañana Consciente</span>
                        {selectedHabits.map(h => (
                          <div key={h.id} class="flex flex-col py-1.5 overflow-hidden">
                            <span class="text-xs font-bold text-slate-800 truncate" title={h.name}>{h.icon} {h.name}</span>
                            {h.videoUrl ? (
                              <button 
                                onClick={() => setActiveVideo({ name: h.name, videoUrl: h.videoUrl })} 
                                class="text-[9px] text-rosegold-600 font-bold text-left hover:underline block mt-0.5"
                              >
                                🎬 Ver videoguía
                              </button>
                            ) : (
                              <span class="text-[8px] text-slate-400 italic block mt-0.5">Rutina básica</span>
                            )}
                          </div>
                        ))}
                      </div>

                      {/* Columnas Dinámicas de Días */}
                      {DAYS.map(day => (
                        <div key={day} class="col-span-1 flex flex-col items-center">
                          <span class="text-[10px] font-bold text-slate-400 h-5 flex items-center">{day}</span>
                          {selectedHabits.map(h => {
                            const isDone = weeklyProgress[day]?.[h.id] || false;
                            return (
                              <button 
                                key={h.id}
                                onClick={() => toggleProgress(day, h.id)}
                                class={`w-8 h-8 my-2 rounded-xl border flex items-center justify-center transition-all ${isDone ? 'bg-rosegold-500 border-rosegold-500 text-white scale-105 shadow-sm' : 'bg-white border-slate-200 text-transparent hover:border-rosegold-300'}`}
                              >
                                <span class="text-xs font-bold">{isDone ? '✓' : ''}</span>
                              </button>
                            );
                          })}
                        </div>
                      ))}

                    </div>
                  </div>
                </div>

                {/* MENSAJE DE TRANQUILIDAD FIJO DE LA ENTRENADORA */}
                <div class="bg-organic-beige p-3.5 rounded-xl border border-rosegold-100 flex gap-2.5 items-start">
                  <AlertCircle class="w-4 h-4 text-rosegold-500 shrink-0 mt-0.5" />
                  <p class="text-xs text-slate-600 leading-relaxed">
                    <strong>Mensaje de tu Entrenadora:</strong> Recuerda que regular tus hormonas pasados los 40 no se logra con sobreexigencia. Tu cuerpo sana a través de la constancia amorosa y la calma. Si olvidas registrar un día, no pasa nada, retoma con amor a la mañana siguiente.
                  </p>
                </div>

              </div>
            )}

          </main>

          {/* PIE DE PÁGINA */}
          <footer class="p-3 bg-rosegold-50 text-center text-[10px] text-rosegold-600 border-t border-rosegold-100 font-medium tracking-wide relative z-10">
            © 2026 Cintura de Nuevo. Herramienta Exclusiva para Alumnas Activas.
          </footer>

        </div>
      );
    }

    // Renderizado en el nodo raíz utilizando la API moderna de React 18
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
