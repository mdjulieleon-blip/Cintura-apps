<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Método Energía de Mañana - Panel de Hábitos Reales</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: {
              900: '#0f172a',
              800: '#1e293b',
              400: '#94a3b8',
              100: '#f1f5f9',
              50: '#f8fafc'
            },
            coral: {
              500: '#e07a5f',
              600: '#c96449',
              100: '#fcece7'
            },
            sage: {
              600: '#6e8b76',
              500: '#8ca693',
              100: '#e3eae5',
              50: '#f3f6f4'
            }
          }
        }
      }
    }
  </script>
  
  <!-- Carga de Babel para JSX en navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Importmap Restringido y Autorizado -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased p-4 sm:p-6 flex items-start justify-center min-h-screen">

  <!-- Contenedor Raíz de la Aplicación -->
  <div id="root" class="w-full max-w-md mx-auto"></div>

  <!-- Componente Autónomo React -->
  <script data-type="module" type="text/babel">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Flame, Shield, Sparkles, CheckCircle2, AlertCircle, Clock, CalendarDays, ChevronDown, ChevronUp, Heart, HelpCircle } from 'lucide-react';

    // Base de datos estática del Método Energía de Mañana
    const PROTOCOL = [
      { 
        id: 1, 
        start: 6.0, 
        end: 8.5, 
        timeStr: "06:00 AM - 08:30 AM",
        name: "Despertar Sin Cortisol", 
        activity: "Luz Natural + Minerales", 
        effect: "Frena el drenaje de tus glándulas adrenales",
        icon: "☀️",
        guide: "Abre tus ventanas y recibe 5 minutos de luz natural directo en tus ojos sin mirar pantallas. Paralelamente, bebe un vaso de agua tibia con una pizca de sal mineral pura. Esto apaga la alerta de peligro celular y enciende energía limpia."
      },
      { 
        id: 2, 
        start: 8.5, 
        end: 11.0, 
        timeStr: "08:30 AM - 11:00 AM",
        name: "Combustible Sostenible", 
        activity: "Desayuno Proteico Real", 
        effect: "Protege tu masa muscular y estabiliza la glucosa",
        icon: "🍳",
        guide: "Asegúrate de incluir mínimo 25g de proteína (huevos, pollo, pavo, tofu) antes de tomar tu primer café de la mañana. Romper el ayuno solo con carbohidratos o café dispara el cortisol y te garantiza pesadez por la tarde."
      },
      { 
        id: 3, 
        start: 13.0, 
        end: 15.0, 
        timeStr: "01:00 PM - 03:00 PM",
        name: "Pausa Anti-Pesadez", 
        activity: "Caminata de Alivio (5 min)", 
        effect: "Desinflama tu abdomen y activa circulación",
        icon: "👟",
        guide: "Justo al terminar de almorzar, camina suavemente por 5 a 10 minutos (puede ser dentro de casa). Esto activa los transportadores GLUT4 de tus músculos, absorbiendo la glucosa de la comida sin generar colapso ni somnolencia post-almuerzo."
      },
      { 
        id: 4, 
        start: 17.0, 
        end: 19.5, 
        timeStr: "05:00 PM - 07:30 PM",
        name: "Drenaje de Tarde", 
        activity: "Movimiento Linfático Expreso", 
        effect: "Libera la retención y pesadez en las piernas",
        icon: "🌿",
        guide: "Párate derecha y realiza 20 rebotes suaves levantando y dejando caer los talones, o recuéstate boca arriba 5 minutos con las piernas estiradas verticalmente apoyadas en la pared. Ayuda a tu sistema a retornar fluidos estancados."
      },
      { 
        id: 5, 
        start: 21.5, 
        end: 24.0, 
        timeStr: "09:30 PM - 12:00 AM",
        name: "Cierre Circadiano", 
        activity: "Apagón de Pantallas", 
        effect: "Permite la segregación de melatonina reparadora",
        icon: "🌙",
        guide: "Atenúa las luces artificiales de tu casa y activa filtros nocturnos en el móvil. Tu cuerpo requiere oscuridad para activar los procesos enzimáticos de quema de grasa nocturna y reparación celular profunda."
      }
    ];

    function App() {
      // --- PERSISTENCIA LOCALSTORAGE ---
      const [streak, setStreak] = useState(() => parseInt(localStorage.getItem('em_v40_streak') || '0'));
      const [shields, setShields] = useState(() => parseInt(localStorage.getItem('em_v40_shields') || '3'));
      
      // Estados dinámicos de UI
      const [activeBlock, setActiveBlock] = useState(null);
      const [selectedBlock, setSelectedBlock] = useState(null); // Para auditar cualquier bloque al hacer clic
      const [notification, setNotification] = useState(null);
      const [currentTimeStr, setCurrentTimeStr] = useState("");

      // Sincronizador de Reloj Interno y Detección Automática de Bloque
      useEffect(() => {
        const calculateTime = () => {
          const now = new Date();
          const hours = now.getHours();
          const minutes = now.getMinutes();
          const decimalTime = hours + minutes / 60;
          
          // Formateador de hora en tiempo real para el header
          const formattedTime = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', hour12: true });
          setCurrentTimeStr(formattedTime);

          // Buscar si hay bloque activo según la hora real
          const found = PROTOCOL.find(block => decimalTime >= block.start && decimalTime < block.end);
          setActiveBlock(found || null);
          
          // Por defecto, si hay bloque activo lo seleccionamos para inspección rápida
          if (found && !selectedBlock) {
            setSelectedBlock(found);
          }
        };

        calculateTime();
        const interval = setInterval(calculateTime, 15000); // Actualiza cada 15 seg
        return () => clearInterval(interval);
      }, []);

      // Auto-ocultar las alertas en la UI
      useEffect(() => {
        if (notification) {
          const timer = setTimeout(() => setNotification(null), 4000);
          return () => clearTimeout(timer);
        }
      }, [notification]);

      // --- LOGICA ACCIONES INTERACTIVAS ---
      const markHabitCompleted = (block) => {
        setStreak(prev => prev + 1);
        setNotification({
          type: 'success',
          text: `¡Hábito "${block.activity}" completado! Cuidar tus ritmos hormonales te aleja del agotamiento crónico. +1 Racha.`
        });
      };

      const triggerShield = () => {
        if (shields > 0) {
          setShields(prev => prev - 1);
          setNotification({
            type: 'shield',
            text: "🛡️ Escudo de autocompasión activado. Escuchar el cansancio severo de tu cuerpo es salud. Tu racha queda protegida."
          });
        } else {
          setNotification({
            type: 'error',
            text: "⚠️ Te has quedado sin escudos de emergencia. No te presiones, respira hondo y retoma el ritmo cuando te sea posible."
          });
        }
      };

      return (
        <div class="bg-white rounded-3xl shadow-md border border-slate-100 overflow-hidden w-full transition-all duration-300">
          
          {/* CONTROL DE NOTIFICACIONES INCORPORADAS */}
          {notification && (
            <div class={`px-4 py-3 text-xs font-semibold flex items-start gap-2 border-b transition-all animate-fade-in ${
              notification.type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' :
              notification.type === 'shield' ? 'bg-indigo-50 border-indigo-100 text-indigo-800' :
              'bg-amber-50 border-amber-100 text-amber-900'
            }`}>
              <AlertCircle class="w-4 h-4 shrink-0 mt-0.5" />
              <span>{notification.text}</span>
            </div>
          )}

          {/* ENCABEZADO PREMIUM E INFORMACIÓN SÍNCRONA */}
          <header class="p-5 bg-white border-b border-slate-100">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-2">
                <span class="text-2xl">🌿</span>
                <div>
                  <h1 class="text-sm font-extrabold tracking-tight text-slate-900 uppercase">Energía de Mañana</h1>
                  <p class="text-[11px] text-sage-600 font-semibold tracking-wide flex items-center gap-1">
                    <Clock class="w-3 h-3 text-sage-500" /> Hora actual: {currentTimeStr}
                  </p>
                </div>
              </div>
              <div class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-bold uppercase tracking-wider">
                Mujer 40+
              </div>
            </div>

            {/* MARCADORES DE RENDIMIENTO SOSTENIBLE */}
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-coral-100/60 border border-coral-500/10 px-3 py-2.5 rounded-xl flex items-center justify-between">
                <div class="flex flex-col">
                  <span class="text-[9px] font-bold text-coral-600 uppercase tracking-wider flex items-center gap-1">
                    <Flame class="w-3 h-3 fill-current" /> Racha Sostenible
                  </span>
                  <span class="text-sm font-black text-slate-900 mt-0.5">{streak} {streak === 1 ? 'Día' : 'Días'}</span>
                </div>
              </div>
              <div class="bg-sage-100/60 border border-sage-500/10 px-3 py-2.5 rounded-xl flex items-center justify-between">
                <div class="flex flex-col">
                  <span class="text-[9px] font-bold text-sage-600 uppercase tracking-wider flex items-center gap-1">
                    <Shield class="w-3 h-3" /> Auto-Compasión
                  </span>
                  <span class="text-sm font-black text-slate-900 mt-0.5">{shields} Escudos</span>
                </div>
              </div>
            </div>
          </header>

          {/* ENFOQUE DINÁMICO EN TIEMPO REAL (BLOQUE ACTUAL O ESTADO GENERAL) */}
          <main class="p-5 bg-slate-50/50 border-b border-slate-100">
            {activeBlock ? (
              <div class="bg-white p-4 rounded-2xl border border-coral-500/20 shadow-sm space-y-3">
                <div class="flex items-center justify-between">
                  <span class="inline-block bg-coral-100 text-coral-600 font-bold text-[9px] px-2 py-0.5 rounded-full uppercase tracking-wider">
                    ⚡ Micro-rutina Activa Ahora
                  </span>
                  <span class="text-xs text-slate-400 font-medium">{activeBlock.timeStr}</span>
                </div>
                <div>
                  <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wide">{activeBlock.name}</h3>
                  <h2 class="text-xl font-black text-slate-900 leading-tight mt-0.5 flex items-center gap-2">
                    <span>{activeBlock.icon}</span> {activeBlock.activity}
                  </h2>
                </div>
                <p class="text-xs text-sage-600 font-semibold italic">
                  ✨ Impacto biológico: {activeBlock.effect}
                </p>
                <div class="p-3 bg-slate-50 rounded-xl text-[11px] text-slate-600 leading-relaxed font-medium border border-slate-100">
                  {activeBlock.guide}
                </div>
                <button
                  onClick={() => markHabitCompleted(activeBlock)}
                  class="w-full bg-coral-500 hover:bg-coral-600 text-white text-xs font-bold uppercase py-3 px-4 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2 hover:scale-[1.01] active:scale-95"
                >
                  <CheckCircle2 class="w-4 h-4" /> Marcar Bloque como Hecho
                </button>
              </div>
            ) : (
              <div class="bg-white p-5 rounded-2xl border border-slate-200 text-center space-y-2">
                <div class="text-2xl">🍃</div>
                <h3 class="text-xs font-black text-slate-700 uppercase tracking-wider">Ventana de Descanso y Autonomía</h3>
                <p class="text-xs text-slate-500 max-w-xs mx-auto leading-relaxed">
                  Estás en un espacio libre de tareas. Tu cuerpo no necesita vivir bajo una alarma constante. Vive tu día con calma.
                </p>
              </div>
            )}
          </main>

          {/* NUEVO PANEL: CRONOGRAMA COMPLETO INTERACTIVO DE HÁBITOS REALES */}
          <section class="p-5 space-y-3">
            <div class="flex items-center justify-between">
              <h3 class="text-xs font-black text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                <CalendarDays class="w-3.5 h-3.5 text-slate-400" /> Cronograma de Rutinas del Método
              </h3>
              <span class="text-[10px] text-slate-400 font-bold">Haz clic para auditar</span>
            </div>

            <div class="space-y-2">
              {PROTOCOL.map((block) => {
                const isRealTimeActive = activeBlock?.id === block.id;
                const isInspected = selectedBlock?.id === block.id;

                return (
                  <div 
                    key={block.id} 
                    onClick={() => setSelectedBlock(isInspected ? null : block)}
                    class={`p-3 rounded-xl border transition-all cursor-pointer text-left ${
                      isRealTimeActive 
                        ? 'bg-coral-100/30 border-coral-500/30 ring-1 ring-coral-500/20' 
                        : isInspected 
                          ? 'bg-slate-50 border-slate-400' 
                          : 'bg-white border-slate-200 hover:bg-slate-50'
                    }`}
                  >
                    <div class="flex items-center justify-between">
                      <div class="flex items-center gap-2.5">
                        <span class="text-lg bg-slate-100 w-8 h-8 rounded-lg flex items-center justify-center shrink-0">
                          {block.icon}
                        </span>
                        <div>
                          <div class="flex items-center gap-1.5">
                            <h4 class="text-xs font-extrabold text-slate-900">{block.activity}</h4>
                            {isRealTimeActive && (
                              <span class="w-1.5 h-1.5 rounded-full bg-coral-500 animate-ping" />
                            )}
                          </div>
                          <p class="text-[10px] text-slate-400 font-semibold">{block.timeStr} · <span class="text-slate-500 font-normal">{block.name}</span></p>
                        </div>
                      </div>
                      <div class="text-slate-400">
                        {isInspected ? <ChevronUp class="w-4 h-4" /> : <ChevronDown class="w-4 h-4" />}
                      </div>
                    </div>

                    {/* Contenido Expandible de Detalles del Bloque */}
                    {isInspected && (
                      <div class="mt-3 pt-3 border-t border-slate-200/60 space-y-2 text-xs animate-fade-in" onClick={(e) => e.stopPropagation()}>
                        <p class="text-slate-500 font-medium">
                          <strong class="text-slate-700">Meta biológica:</strong> {block.effect}
                        </p>
                        <div class="p-2.5 bg-slate-100 rounded-lg text-slate-600 leading-relaxed text-[11px]">
                          {block.guide}
                        </div>
                        <div class="flex gap-2 pt-1">
                          <button
                            onClick={() => markHabitCompleted(block)}
                            class="flex-1 bg-slate-900 text-white font-bold text-[10px] uppercase py-2 px-3 rounded-lg hover:bg-slate-800 transition-colors flex items-center justify-center gap-1"
                          >
                            <CheckCircle2 class="w-3 h-3" /> Registrar acción manual
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </section>

          {/* PANEL DE CONTROL DE EMERGENCIAS INTERNAS */}
          <footer class="p-5 bg-slate-50 border-t border-slate-100 space-y-3">
            <div class="bg-white p-3 rounded-xl border border-slate-200 space-y-2">
              <div class="flex items-center gap-1 text-xs font-bold text-slate-700">
                <HelpCircle class="w-3.5 h-3.5 text-slate-400" /> ¿Día complejo o agotamiento severo?
              </div>
              <p class="text-[11px] text-slate-500 leading-relaxed">
                Si hoy tu energía está en el piso debido al trabajo o mala noche, no te fuerces a cumplir. Usa un escudo para salvar tus rachas y descansar sin culpas.
              </p>
              <button
                onClick={triggerShield}
                class="w-full bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 text-[11px] font-bold uppercase py-2.5 px-4 rounded-xl transition-all flex items-center justify-center gap-1.5 shadow-sm active:scale-95"
              >
                <Shield class="w-3.5 h-3.5 text-indigo-600" /> Usar Escudo de Autocompasión
              </button>
            </div>

            <p class="text-[9px] text-center text-slate-400 font-semibold flex items-center justify-center gap-1 pt-1">
              <Heart class="w-3 h-3 text-coral-500 fill-current" /> Método Energía de Mañana · Hábitos adaptados a tu biología hormonal.
            </p>
          </footer>

        </div>
      );
    }

    // Inyección y Render inicial en el DOM
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
